<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" width="1400" height="960">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>

    <!-- Icon: Phone -->
    <g id="icon-phone">
      <rect x="-10" y="-14" width="20" height="28" rx="3" fill="none" stroke="#2563eb" stroke-width="1.5"/>
      <line x1="-5" y1="10" x2="5" y2="10" stroke="#2563eb" stroke-width="1.5"/>
    </g>

    <!-- Icon: Cloud -->
    <g id="icon-cloud">
      <path d="M-10,2 A5,5 0 0,1 -7,-5 A7,7 0 0,1 4,-6 A6,6 0 0,1 9,-1 A4,4 0 0,1 4,4 L-8,4 A5,5 0 0,1 -10,2Z" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5"/>
    </g>

    <!-- Icon: Database -->
    <g id="icon-db">
      <ellipse cx="0" cy="-6" rx="10" ry="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <path d="M-10,-6 L-10,6 A10,4 0 0,0 10,6 L10,-6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <path d="M-10,6 A10,4 0 0,0 10,6" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    </g>

    <!-- Icon: Book -->
    <g id="icon-book">
      <rect x="-11" y="-9" width="22" height="18" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="0" y1="-9" x2="0" y2="9" stroke="#16a34a" stroke-width="1"/>
    </g>

    <!-- Icon: Audio/Speaker -->
    <g id="icon-audio">
      <rect x="-8" y="-7" width="10" height="14" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
      <path d="M3,-3 Q8,0 3,3" fill="none" stroke="#ea580c" stroke-width="1.5"/>
    </g>

    <!-- Icon: Brain/Review -->
    <g id="icon-brain">
      <circle cx="0" cy="-4" r="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <path d="M-3,-7 Q0,-11 3,-7 M-5,2 Q0,-1 5,2" fill="none" stroke="#dc2626" stroke-width="1.2"/>
    </g>

    <!-- Icon: Star -->
    <g id="icon-star">
      <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,4 -5,7 -3,1 -8,-3 -2,-3" fill="#fef9c3" stroke="#eab308" stroke-width="1.2"/>
    </g>

    <!-- Icon: Gear -->
    <g id="icon-gear">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#6b7280" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" fill="none" stroke="#6b7280" stroke-width="1"/>
    </g>

    <!-- Icon: Gamepad -->
    <g id="icon-game">
      <rect x="-10" y="-7" width="20" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
      <circle cx="-4" cy="0" r="1.5" fill="#7c3aed"/>
      <circle cx="2" cy="-3" r="1.5" fill="#7c3aed"/>
      <line x1="-6" y1="2" x2="-6" y2="4" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-7" y1="3" x2="-5" y2="3" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Icon: Users -->
    <g id="icon-user">
      <circle cx="0" cy="-6" r="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <path d="M-7,6 Q-7,1 0,1 Q7,1 7,6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    </g>

    <!-- Icon: Book/Textbook -->
    <g id="icon-textbook">
      <path d="M-10,-7 Q-5,-10 0,-7 L10,-3 L10,7 L0,4 L-10,7Z" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="-10" y1="7" x2="0" y2="4" stroke="#16a34a" stroke-width="1"/>
    </g>

    <!-- Icon: Chart/Report -->
    <g id="icon-report">
      <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
      <line x1="-5" y1="4" x2="-5" y2="-2" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="6" x2="0" y2="-4" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
      <line x1="5" y1="2" x2="5" y2="-6" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Icon: Story/Book-open -->
    <g id="icon-story">
      <path d="M-10,-7 Q-5,-10 0,-7 L10,-3 L10,7 L0,4 L-10,7Z" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
      <line x1="-10" y1="7" x2="0" y2="4" stroke="#9333ea" stroke-width="1"/>
    </g>

    <!-- Icon: Check-in/Calendar -->
    <g id="icon-checkin">
      <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
      <line x1="-3" y1="-5" x2="-3" y2="2" stroke="#0d9488" stroke-width="1"/>
      <line x1="3" y1="-5" x2="3" y2="2" stroke="#0d9488" stroke-width="1"/>
      <path d="M-5,1 L-2,4 L3,-2" fill="none" stroke="#16a34a" stroke-width="1.5"/>
    </g>

    <!-- Layer background -->
    <rect x="10" y="10" width="1380" height="940" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>

  <!-- Title -->
  <text x="700" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">phonics-h5 · 自然拼读 H5 应用系统架构</text>

  <!-- ============ LAYER: CLIENT (移动端 H5) ============ -->
  <g transform="translate(40, 65)">
    <rect width="1320" height="180" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="28" font-size="14" font-weight="600" fill="#475569">📱 客户端层 (Client) — React SPA + PWA</text>

    <!-- App Shell -->
    <g transform="translate(30, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
      <use href="#icon-phone" x="-7" y="43"/>
      <text x="10" y="42" font-size="15" font-weight="600" fill="#1e293b">App 外壳</text>
      <text x="10" y="58" font-size="11" fill="#64748b">HashRouter · TabBar</text>
      <text x="10" y="71" font-size="11" fill="#64748b">@fontsource · @tabler/icons</text>
    </g>

    <!-- Page Router / Views -->
    <g transform="translate(255, 45)" filter="url(#shadow)">
      <rect width="220" height="115" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
      <use href="#icon-book" x="-7" y="43"/>
      <text x="10" y="42" font-size="15" font-weight="600" fill="#1e293b">页面视图 (Views)</text>
      <text x="10" y="58" font-size="11" fill="#64748b">首页 · 分级 · 单元 · 游戏</text>
      <text x="10" y="71" font-size="11" fill="#64748b">复习 · 错题 · 故事 · 对话</text>
    </g>

    <!-- Core Context -->
    <g transform="translate(500, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
      <use href="#icon-gear" x="-6" y="43"/>
      <text x="10" y="42" font-size="15" font-weight="600" fill="#1e293b">核心 Context</text>
      <text x="10" y="58" font-size="11" fill="#64748b">AuthProvider · ProgressProvider</text>
      <text x="10" y="71" font-size="11" fill="#64748b">useDevice (响应式适配)</text>
    </g>

    <!-- Feature Modules -->
    <g transform="translate(725, 45)" filter="url(#shadow)">
      <rect width="230" height="115" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
      <use href="#icon-game" x="-7" y="43"/>
      <text x="10" y="42" font-size="15" font-weight="600" fill="#1e293b">功能模块</text>
      <text x="10" y="58" font-size="11" fill="#64748b">字母发音 · 音节拼读 · 游戏闯关</text>
      <text x="10" y="71" font-size="11" fill="#64748b">教材同步 · SRS间隔复习 · 打卡成就</text>
    </g>

    <!-- Audio Engine -->
    <g transform="translate(980, 45)" filter="url(#shadow)">
      <rect width="180" height="115" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
      <use href="#icon-audio" x="-6" y="43"/>
      <text x="10" y="42" font-size="15" font-weight="600" fill="#1e293b">音频引擎</text>
      <text x="10" y="58" font-size="11" fill="#64748b">Web Audio API · TTS 合成</text>
      <text x="10" y="71" font-size="11" fill="#64748b">内置 m4a 词库 (168+)</text>
    </g>

    <!-- Offline / PWA -->
    <g transform="translate(1190, 45)" filter="url(#shadow)">
      <rect width="100" height="115" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
      <use href="#icon-checkin" x="-7" y="43"/>
      <text x="5" y="42" font-size="15" font-weight="600" fill="#1e293b">离线</text>
      <text x="5" y="58" font-size="11" fill="#64748b">Service</text>
      <text x="5" y="71" font-size="11" fill="#64748b">Worker +</text>
      <text x="5" y="84" font-size="11" fill="#64748b">localStorage</text>
    </g>
  </g>

  <!-- ============ LAYER: DATA & CONTENT ============ -->
  <g transform="translate(40, 270)">
    <rect width="1320" height="180" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="28" font-size="14" font-weight="600" fill="#475569">📚 数据与内容层 (Data &amp; Content)</text>

    <!-- Local Data Modules -->
    <g transform="translate(30, 45)" filter="url(#shadow)">
      <rect width="210" height="115" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#16a34a">📄 本地数据模块</text>
      <text x="10" y="55" font-size="12" fill="#374151">curriculum.js — 课程大纲/单元结构</text>
      <text x="10" y="70" font-size="12" fill="#374151">textbook.js — 教材内容 (PEP等)</text>
      <text x="10" y="85" font-size="12" fill="#374151">dialogues.js / stories.js</text>
      <text x="10" y="100" font-size="12" fill="#374151">word-cn.js — 中文释义映射</text>
    </g>

    <!-- Audio Assets -->
    <g transform="translate(265, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#ea580c">🔊 音频资源</text>
      <text x="10" y="55" font-size="12" fill="#374151">l_*.m4a — 字母发音 (168个)</text>
      <text x="10" y="70" font-size="12" fill="#374151">w_*.m4a — 单词发音</text>
      <text x="10" y="85" font-size="12" fill="#374151">存放于 dist/audio/</text>
      <text x="10" y="100" font-size="11" fill="#9ca3af">站点 CDN 同源托管</text>
    </g>

    <!-- Image Assets -->
    <g transform="translate(485, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#2563eb">🖼 图片资源</text>
      <text x="10" y="55" font-size="12" fill="#374151">word-img/ — 词汇配图 (打包)</text>
      <text x="10" y="70" font-size="12" fill="#374151">icons/ — PWA 图标</text>
      <text x="10" y="85" font-size="12" fill="#374151">教材图片 (ASSETS_BASE)</text>
    </g>

    <!-- SRS Data -->
    <g transform="translate(700, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#dc2626">🧠 SRS 间隔复习</text>
      <text x="10" y="55" font-size="12" fill="#374151">Leitner 盒子 (6级)</text>
      <text x="10" y="70" font-size="12" fill="#374151">10min → 1d → 2d → 4d → 8d → 16d</text>
      <text x="10" y="85" font-size="12" fill="#374151">mistakes / srs / daily 存本地</text>
    </g>

    <!-- Progress State -->
    <g transform="translate(920, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#9333ea">⭐ 学习进度</text>
      <text x="10" y="55" font-size="12" fill="#374151">stars (关卡星级)</text>
      <text x="10" y="70" font-size="12" fill="#374151">checkins (连续打卡)</text>
      <text x="10" y="85" font-size="12" fill="#374151">profile / achievements</text>
    </g>

    <!-- Textbook Module -->
    <g transform="translate(1140, 45)" filter="url(#shadow)">
      <rect width="140" height="115" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#0d9488">📖 教材模块</text>
      <text x="10" y="55" font-size="12" fill="#374151">PEP人教版等</text>
      <text x="10" y="70" font-size="12" fill="#374151">多教材兼容</text>
      <text x="10" y="85" font-size="11" fill="#9ca3af">Book → Unit → Activity</text>
    </g>
  </g>

  <!-- ============ LAYER: CLOUD SYNC ============ -->
  <g transform="translate(40, 475)">
    <rect width="1320" height="180" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="28" font-size="14" font-weight="600" fill="#475569">☁️ 云端同步层 (Cloud Sync)</text>

    <!-- Supabase Auth -->
    <g transform="translate(30, 45)" filter="url(#shadow)">
      <rect width="210" height="115" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#16a34a">🔐 认证 (Supabase Auth)</text>
      <text x="10" y="55" font-size="12" fill="#374151">邮箱/密码登录</text>
      <text x="10" y="70" font-size="12" fill="#374151">Anon Key 鉴权</text>
      <text x="10" y="85" font-size="12" fill="#374151">Guest 模式 (离线降级)</text>
    </g>

    <!-- Supabase DB -->
    <g transform="translate(265, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#2563eb">🗄 数据库 (Supabase/PG)</text>
      <text x="10" y="55" font-size="12" fill="#374151">user_progress — 学习进度</text>
      <text x="10" y="70" font-size="12" fill="#374151">stars / checkins / mistakes</text>
      <text x="10" y="85" font-size="11" fill="#9ca3af">云-端双向同步 · 冲突取高星</text>
    </g>

    <!-- Deploy Pipeline -->
    <g transform="translate(495, 45)" filter="url(#shadow)">
      <rect width="220" height="115" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#9333ea">🚀 部署与构建</text>
      <text x="10" y="55" font-size="12" fill="#374151">Vite build → dist/</text>
      <text x="10" y="70" font-size="12" fill="#374151">wrangler pages deploy</text>
      <text x="10" y="85" font-size="12" fill="#374151">(Cloudflare Pages / Vercel)</text>
    </g>

    <!-- CDN Assets -->
    <g transform="translate(740, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#ea580c">🌐 CDN 静态资源</text>
      <text x="10" y="55" font-size="12" fill="#374151">音频 (m4a)</text>
      <text x="10" y="70" font-size="12" fill="#374151">图片 (word-img)</text>
      <text x="10" y="85" font-size="12" fill="#374151">R2 上传脚本</text>
    </g>

    <!-- R2 Storage -->
    <g transform="translate(965, 45)" filter="url(#shadow)">
      <rect width="200" height="115" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#dc2626">📦 R2 存储 (可选)</text>
      <text x="10" y="55" font-size="12" fill="#374151">Cloudflare R2 桶</text>
      <text x="10" y="70" font-size="12" fill="#374151">存放音频和图片</text>
      <text x="10" y="85" font-size="11" fill="#9ca3af">替代方案: 打包进 dist/</text>
    </g>

    <!-- Manifest / PWA -->
    <g transform="translate(1190, 45)" filter="url(#shadow)">
      <rect width="120" height="115" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
      <text x="10" y="35" font-size="14" font-weight="600" fill="#0d9488">📋 PWA</text>
      <text x="10" y="55" font-size="12" fill="#374151">manifest.json</text>
      <text x="10" y="70" font-size="12" fill="#374151">sw.js 注册</text>
      <text x="10" y="85" font-size="11" fill="#9ca3af">离线缓存 · 添加到主屏</text>
    </g>
  </g>

  <!-- ============ FLOWS / ARROWS ============ -->
  <!-- Client -> Cloud Sync Arrows -->
  <line x1="650" y1="245" x2="650" y2="270" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6,3"/>
  <text x="655" y="260" font-size="11" fill="#9333ea">双向同步</text>

  <line x1="870" y1="245" x2="870" y2="270" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>
  <text x="875" y="260" font-size="11" fill="#2563eb">部署发布</text>

  <line x1="1120" y1="245" x2="1120" y2="270" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="6,3"/>
  <text x="1125" y="260" font-size="11" fill="#ea580c">CDN/R2 上传</text>

  <!-- Internal flows within Client layer -->
  <line x1="240" y1="150" x2="255" y2="150" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="485" y1="150" x2="500" y2="150" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="715" y1="150" x2="725" y2="150" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="970" y1="150" x2="980" y2="150" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Internal flows within Data layer -->
  <line x1="250" y1="350" x2="265" y2="350" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="475" y1="350" x2="490" y2="350" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="690" y1="350" x2="710" y2="350" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="685" y="345" font-size="10" fill="#dc2626">读取/写入</text>

  <!-- Legend -->
  <g transform="translate(30, 870)">
    <rect width="300" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="22" font-size="13" font-weight="600" fill="#475569">图例</text>
    <line x1="15" y1="38" x2="45" y2="38" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="50" y="42" font-size="11" fill="#6b7280">数据同步 / 云-端通信</text>
    <line x1="15" y1="52" x2="45" y2="52" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="50" y="56" font-size="11" fill="#6b7280">资源上传 / CDN</text>
    <line x1="15" y1="62" x2="45" y2="62" stroke="#e2e8f0" stroke-width="1"/>
    <text x="50" y="66" font-size="11" fill="#6b7280">（虚线框 = 逻辑分组）</text>
  </g>

  <!-- Bottom note -->
  <text x="700" y="930" text-anchor="middle" font-size="11" fill="#9ca3af">技术栈: React 19 · Vite 8 · Supabase JS SDK · PWA (Manifest + SW) · Fontsource 本地字体</text>
</svg>